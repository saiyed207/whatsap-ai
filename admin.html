<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirana Store Admin</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; text-align: center; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); display: inline-block; margin-top: 50px; }
        input { display: block; width: 90%; margin: 10px auto; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #25D366; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #25D366; color: white; }
        #dashboard { display: none; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="box">
        <h2>🔒 Admin Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="errorMsg" style="color:red; display:none;">Incorrect details!</p>
    </div>

    <!-- DASHBOARD SCREEN -->
    <div id="dashboard">
        <h2>📦 Recent Orders Dashboard</h2>
        <button onclick="fetchOrders()" style="background:#007BFF; margin-bottom: 10px;">🔄 Refresh Orders</button>
        <table id="ordersTable">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Phone</th>
                    <th>Product</th>
                    <th>Name & Address</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Orders will appear here -->
            </tbody>
        </table>
    </div>

    <script>
        // 🌟 YOUR FIREBASE LINK (Same as index.js)
        const FIREBASE_URL = "YOUR_FIREBASE_LINK_HERE/orders.json";

        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Password Check
            if(user === "admin" && pass === "admin123") {
                document.getElementById('loginScreen').style.display = "none";
                document.getElementById('dashboard').style.display = "block";
                fetchOrders(); // Load orders immediately
            } else {
                document.getElementById('errorMsg').style.display = "block";
            }
        }

        async function fetchOrders() {
            const response = await fetch(FIREBASE_URL);
            const data = await response.json();
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ""; // Clear table

            if(data) {
                // Loop through all orders from database
                Object.keys(data).forEach(key => {
                    const order = data[key];
                    tbody.innerHTML += `
                        <tr>
                            <td>${order.time}</td>
                            <td>${order.phone}</td>
                            <td><b>${order.product}</b></td>
                            <td>${order.address}</td>
                        </tr>
                    `;
                });
            } else {
                tbody.innerHTML = "<tr><td colspan='4'>No orders yet.</td></tr>";
            }
        }
    </script>

</body>
</html>

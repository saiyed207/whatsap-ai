name: WhatsApp QR Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Delete Old Session
        run: rm -rf auth_info

      - name: Install Packages
        run: npm install

      - name: Start Bot
        run: npm start
